<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta charset="UTF-8">
    <title>Meter Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <!-- MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="app.js" defer></script>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginScreen" class="screen">
    <h2>Enter Meter Serial</h2>
    <input type="text" id="serialInput" placeholder="Enter Serial">
    <button onclick="goToSelection()">Next</button>
</div>

<!-- ================= SELECTION ================= -->
<div id="selectionScreen" class="screen">
    <h2>Select Option</h2>

    <button onclick="openConfig()">Configure Registers</button>
    <button onclick="openDashboard()">Go to Dashboard</button>

    <button class="backBtn" onclick="goBack('selection')">Back</button>
</div>

<!-- ================= CONFIG ================= -->
<div id="configScreen" class="screen">
    <h2>Configure Registers</h2>

    <div class="configItem" onclick="editParam('l1')">L1 Voltage: <span id="l1_reg">--</span></div>
    <div class="configItem" onclick="editParam('l2')">L2 Voltage: <span id="l2_reg">--</span></div>
    <div class="configItem" onclick="editParam('l3')">L3 Voltage: <span id="l3_reg">--</span></div>

    <div class="configItem" onclick="editParam('i1')">L1 Current: <span id="i1_reg">--</span></div>
    <div class="configItem" onclick="editParam('i2')">L2 Current: <span id="i2_reg">--</span></div>
    <div class="configItem" onclick="editParam('i3')">L3 Current: <span id="i3_reg">--</span></div>

    <div class="configItem" onclick="editParam('pf')">Power Factor: <span id="pf_reg">--</span></div>

    <button onclick="saveConfig()">Save</button>

    <button class="backBtn" onclick="goBack('config')">Back</button>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboardScreen" class="screen">

    <h2>Meter Dashboard</h2>

   <div id="dashboard">
            <div class="box" id="l1"><span>L1 Voltage</span><span class="value">--</span></div>
            <div class="box" id="l2"><span>L2 Voltage</span><span class="value">--</span></div>
            <div class="box" id="l3"><span>L3 Voltage</span><span class="value">--</span></div>

            <div class="box" id="i1"><span>L1 Current</span><span class="value">--</span></div>
            <div class="box" id="i2"><span>L2 Current</span><span class="value">--</span></div>
            <div class="box" id="i3"><span>L3 Current</span><span class="value">--</span></div>

            <div class="box power" id="pf"><span>Power Factor</span><span class="value">--</span></div>
        </div>

    <button class="backBtn" onclick="goBack('dashboard')">Back</button>
</div>

<div id="status">Connecting...</div>

</body>
</html>
