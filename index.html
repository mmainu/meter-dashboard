<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meter Dashboard</title>

    <!-- MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css?v=2">

    <!-- MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <!-- JS -->
    <script src="app.js" defer></script>
</head>

<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen">
    <h2>Enter Meter Serial Number</h2>
    <input type="text" id="serialInput" placeholder="e.g. 1001">
    <button onclick="startDashboard()">Connect</button>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="app" style="display:none;">

    <div id="container">

        <h1>Meter Dashboard</h1>

        <div id="dashboard">
            <div class="box" id="l1"><span>L1 Voltage</span><span class="value">--</span></div>
            <div class="box" id="l2"><span>L2 Voltage</span><span class="value">--</span></div>
            <div class="box" id="l3"><span>L3 Voltage</span><span class="value">--</span></div>

            <div class="box" id="i1"><span>L1 Current</span><span class="value">--</span></div>
            <div class="box" id="i2"><span>L2 Current</span><span class="value">--</span></div>
            <div class="box" id="i3"><span>L3 Current</span><span class="value">--</span></div>

            <div class="box power" id="pf"><span>Power Factor</span><span class="value">--</span></div>
        </div>

        <div id="status">Connecting...</div>

    </div>

    <!-- BACK BUTTON -->
    <button id="backBtn" onclick="goBack()">⬅ Back</button>

</div>

</body>
</html>
